<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" /><meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Recipient Activity</title>
<style>
  :root{--bg:#f4f6fb;--panel:#fff;--panel-2:#f7f8fc;--line:#e4e8f1;--txt:#161b26;--muted:#616b83;--faint:#97a0b5;--accent:#4c63e6;--accent-soft:#eaeeff;--good:#0f9d63;--good-bg:#e4f5ec;--warn:#b3781a;--warn-bg:#faf0da;--bad:#d64545;--bad-bg:#fbe6e6;--radius:14px;--shadow:0 1px 2px rgba(20,28,54,.05),0 8px 24px rgba(20,28,54,.05);}
  @media (prefers-color-scheme:dark){:root{--bg:#0d1017;--panel:#151a23;--panel-2:#1a212c;--line:#262e3c;--txt:#e7eaf2;--muted:#8b94a8;--faint:#5e6779;--accent:#7e93ff;--accent-soft:#1b2338;--good:#35d38a;--good-bg:#10301f;--warn:#e6b452;--warn-bg:#332711;--bad:#ff6b6b;--bad-bg:#361818;--shadow:0 1px 2px rgba(0,0,0,.3),0 10px 30px rgba(0,0,0,.35);}}
  :root[data-theme="dark"]{--bg:#0d1017;--panel:#151a23;--panel-2:#1a212c;--line:#262e3c;--txt:#e7eaf2;--muted:#8b94a8;--faint:#5e6779;--accent:#7e93ff;--accent-soft:#1b2338;--good:#35d38a;--good-bg:#10301f;--warn:#e6b452;--warn-bg:#332711;--bad:#ff6b6b;--bad-bg:#361818;}
  :root[data-theme="light"]{--bg:#f4f6fb;--panel:#fff;--panel-2:#f7f8fc;--line:#e4e8f1;--txt:#161b26;--muted:#616b83;--faint:#97a0b5;--accent:#4c63e6;--accent-soft:#eaeeff;--good:#0f9d63;--good-bg:#e4f5ec;--warn:#b3781a;--warn-bg:#faf0da;--bad:#d64545;--bad-bg:#fbe6e6;}
  *{box-sizing:border-box;}
  body{margin:0;background:var(--bg);color:var(--txt);font-family:system-ui,-apple-system,"Segoe UI",Roboto,Arial,sans-serif;font-size:14px;line-height:1.5;}
  .num{font-variant-numeric:tabular-nums;}
  .shell{max-width:1080px;margin:0 auto;padding:28px 24px 60px;}
  header.top{margin-bottom:20px;}
  h1{margin:0;font-size:22px;font-weight:750;}
  header .sub{color:var(--muted);font-size:13px;margin-top:4px;}
  header a{color:var(--accent);text-decoration:none;}
  .search{width:100%;max-width:420px;margin:18px 0 22px;padding:11px 14px;font-size:14px;border-radius:10px;border:1px solid var(--line);background:var(--panel);color:var(--txt);outline:none;}
  .search:focus{border-color:var(--accent);}
  .panel{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);margin-bottom:18px;overflow:hidden;}
  .panel h2{margin:0;padding:16px 20px;font-size:13px;font-weight:700;border-bottom:1px solid var(--line);}
  .table-scroll{overflow-x:auto;}
  table{width:100%;border-collapse:collapse;}
  th{text-align:left;font-size:10.5px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;color:var(--faint);padding:10px 16px;border-bottom:1px solid var(--line);}
  td{padding:11px 16px;border-bottom:1px solid var(--line);font-size:12.5px;white-space:nowrap;}
  tr:last-child td{border-bottom:none;}
  tbody tr.click-row{cursor:pointer;}
  tbody tr.click-row:hover td{background:var(--panel-2);}
  .badge{display:inline-block;font-size:10.5px;font-weight:700;padding:2px 8px;border-radius:999px;}
  .b-good{color:var(--good);background:var(--good-bg);}.b-warn{color:var(--warn);background:var(--warn-bg);}.b-bad{color:var(--bad);background:var(--bad-bg);}
  .evt{display:inline-flex;align-items:center;gap:6px;font-size:11px;font-weight:700;padding:3px 9px;border-radius:999px;text-transform:capitalize;}
  .evt::before{content:"";width:6px;height:6px;border-radius:50%;}
  .evt.open{color:var(--accent);background:var(--accent-soft);}.evt.open::before{background:var(--accent);}
  .evt.click{color:var(--good);background:var(--good-bg);}.evt.click::before{background:var(--good);}
  .evt.unsubscribe{color:var(--warn);background:var(--warn-bg);}.evt.unsubscribe::before{background:var(--warn);}
  .evt.bounce{color:var(--bad);background:var(--bad-bg);}.evt.bounce::before{background:var(--bad);}
  .muted{color:var(--muted);}.faint{color:var(--faint);font-size:11px;}
  .empty{padding:26px;text-align:center;color:var(--faint);}
  .det-head{padding:16px 20px;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:12px;flex-wrap:wrap;}
  .det-head .em{font-size:15px;font-weight:700;}
  td.wrap{white-space:normal;word-break:break-word;max-width:260px;color:var(--muted);}
</style>
</head>
<body>
<div class="shell">
  <header class="top">
    <h1>Recipient Activity</h1>
    <div class="sub">Search a recipient to see every email, open, and click &nbsp;|&nbsp; <a href="/tracking.html">← Analytics</a> · <a href="/">Activity</a></div>
  </header>

  <input class="search" id="q" type="text" placeholder="Search by email…" autocomplete="off" />

  <div class="panel">
    <h2>Recipients</h2>
    <div class="table-scroll"><table>
      <thead><tr><th>Recipient</th><th>Emails</th><th>Opens</th><th>Clicks</th><th>Last activity</th><th>Status</th></tr></thead>
      <tbody id="list"><tr><td colspan="6" class="empty">Loading…</td></tr></tbody>
    </table></div>
  </div>

  <div id="detail"></div>
</div>

<script>
  const el=(id)=>document.getElementById(id);
  const esc=(s)=>(s==null?"":String(s)).replace(/[&<>]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;"}[c]));
  const dt=(t)=>{ if(!t) return "—"; const d=new Date(t); return isNaN(d)?esc(t):d.toLocaleString(); };

  async function search(q){
    try{
      const r=await fetch("/api/analytics/recipients?q="+encodeURIComponent(q)).then(x=>x.json());
      const rows=r.recipients||[];
      if(!rows.length){ el("list").innerHTML='<tr><td colspan="6" class="empty">No recipients found</td></tr>'; return; }
      el("list").innerHTML=rows.map(p=>`
        <tr class="click-row" onclick="openDetail('${esc(p.email)}')">
          <td>${esc(p.email)}</td><td class="num">${p.emails}</td><td class="num">${p.opens}</td><td class="num">${p.clicks}</td>
          <td class="muted num">${dt(p.lastActivity)}</td>
          <td>${p.bounced?'<span class="badge b-bad">bounced</span>':'<span class="badge b-good">active</span>'}</td>
        </tr>`).join("");
    }catch(e){ el("list").innerHTML='<tr><td colspan="6" class="empty">Failed: '+esc(e.message)+'</td></tr>'; }
  }

  async function openDetail(email){
    const box=el("detail"); box.innerHTML='<div class="panel"><div class="empty">Loading…</div></div>';
    try{
      const r=await fetch("/api/analytics/recipient?email="+encodeURIComponent(email)).then(x=>x.json());
      const supp=r.suppressed?`<span class="badge b-warn">suppressed · ${esc(r.suppressed)}</span>`:"";
      const emails=(r.emails||[]).map(e=>`
        <tr>
          <td class="wrap">${esc(e.subject||"(no subject)")}</td>
          <td>${e.delivery_status}</td>
          <td class="num">${e.open_count}<div class="faint">first ${dt(e.first_opened_at)} · last ${dt(e.last_opened_at)}</div></td>
          <td class="num">${e.click_count}<div class="faint">first ${dt(e.first_clicked_at)} · last ${dt(e.last_clicked_at)}</div></td>
          <td class="muted num">${dt(e.sent_at)}</td>
        </tr>`).join("") || '<tr><td colspan="5" class="empty">No emails</td></tr>';
      const timeline=(r.timeline||[]).map(t=>`
        <tr>
          <td><span class="evt ${esc(t.event_type)}">${esc(t.event_type)}</span></td>
          <td class="wrap">${t.event_type==="click"&&t.link_url?esc(t.link_url):esc(t.subject||"")}</td>
          <td class="muted">${[t.device_type,t.browser].filter(Boolean).map(esc).join(" · ")||"—"}</td>
          <td class="muted num">${dt(t.created_at)}</td>
        </tr>`).join("") || '<tr><td colspan="4" class="empty">No events yet</td></tr>';
      box.innerHTML=`
        <div class="panel">
          <div class="det-head"><span class="em">${esc(email)}</span>${supp}</div>
          <div class="table-scroll"><table>
            <thead><tr><th>Email</th><th>Status</th><th>Opens</th><th>Clicks</th><th>Sent</th></tr></thead>
            <tbody>${emails}</tbody></table></div>
        </div>
        <div class="panel"><h2>Timeline</h2><div class="table-scroll"><table>
          <thead><tr><th>Event</th><th>Detail</th><th>Device</th><th>When</th></tr></thead>
          <tbody>${timeline}</tbody></table></div></div>`;
      box.scrollIntoView({behavior:"smooth",block:"start"});
    }catch(e){ box.innerHTML='<div class="panel"><div class="empty">Failed: '+esc(e.message)+'</div></div>'; }
  }

  let timer;
  el("q").addEventListener("input",(e)=>{ clearTimeout(timer); timer=setTimeout(()=>search(e.target.value.trim()),250); });
  search("");
</script>
</body>
</html>
