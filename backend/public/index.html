<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>AI Email Assistant — Dashboard</title>
    <style>
      :root {
        --bg: #0f1420; --card: #182033; --line: #26304a;
        --txt: #e6e9f0; --muted: #8a94ad; --accent: #4c8dff;
      }
      * { box-sizing: border-box; }
      body { margin: 0; font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif; background: var(--bg); color: var(--txt); }
      header { padding: 20px 28px; border-bottom: 1px solid var(--line); display: flex; justify-content: space-between; align-items: center; }
      h1 { font-size: 18px; margin: 0; }
      .muted { color: var(--muted); font-size: 13px; }
      .wrap { padding: 24px 28px; }
      .stats { display: flex; gap: 16px; flex-wrap: wrap; margin-bottom: 24px; }
      .card { background: var(--card); border: 1px solid var(--line); border-radius: 12px; padding: 16px 20px; min-width: 130px; }
      .card .n { font-size: 28px; font-weight: 700; }
      .card .l { color: var(--muted); font-size: 12px; text-transform: uppercase; letter-spacing: .05em; }
      .tablewrap { overflow-x: auto; }
      table { width: 100%; border-collapse: collapse; background: var(--card); border: 1px solid var(--line); border-radius: 12px; overflow: hidden; }
      th, td { text-align: left; padding: 12px 14px; border-bottom: 1px solid var(--line); font-size: 13px; vertical-align: top; }
      th { color: var(--muted); font-weight: 600; text-transform: uppercase; font-size: 11px; letter-spacing: .05em; }
      tr:last-child td { border-bottom: none; }
      .badge { display: inline-block; padding: 2px 8px; border-radius: 999px; font-size: 11px; font-weight: 600; text-transform: capitalize; }
      .replied { background: #123a2a; color: #5be0a0; }
      .skipped { background: #33260f; color: #e0b45b; }
      .escalated { background: #3a1a2a; color: #ff8fb0; }
      .error { background: #3a1414; color: #ff6b6b; }
      .sent { background: #123a2a; color: #5be0a0; }
      .draft { background: #1c2740; color: #9db4e6; }
      .preview { color: var(--muted); max-width: 460px; margin-top: 4px; }
      .subj { font-weight: 600; }
      .empty { padding: 40px; text-align: center; color: var(--muted); }
      .toggle { border: 1px solid var(--line); background: var(--card); color: var(--txt); padding: 8px 16px; border-radius: 999px; font-weight: 600; font-size: 13px; cursor: pointer; }
      .toggle.on { background: #123a2a; color: #5be0a0; border-color: #1c5c40; }
      .toggle.off { background: #3a1414; color: #ff6b6b; border-color: #5c1c1c; }
      .toggle:disabled { opacity: .6; cursor: default; }
      .tbtn { border: 1px solid var(--line); background: var(--card); color: var(--txt); padding: 5px 12px; border-radius: 8px; font-size: 12px; font-weight: 600; cursor: pointer; white-space: nowrap; }
      .tbtn.paused { background: #3a1414; color: #ff6b6b; border-color: #5c1c1c; }
    </style>
  </head>
  <body>
    <header>
      <div>
        <h1>AI Email Assistant</h1>
        <div class="muted">Activity dashboard (MVP)</div>
      </div>
      <div style="display: flex; align-items: center; gap: 16px">
        <button id="toggle" class="toggle" onclick="toggleAi()">AI: …</button>
        <div class="muted" id="updated">—</div>
      </div>
    </header>
    <div class="wrap">
      <div class="stats" id="stats"></div>
      <div class="tablewrap">
        <table>
          <thead>
            <tr>
              <th>Status</th><th>From</th><th>Subject / Reply</th>
              <th>Mode</th><th>AI time</th><th>When</th><th>AI toggle</th>
            </tr>
          </thead>
          <tbody id="rows">
            <tr><td colspan="7" class="empty">Loading…</td></tr>
          </tbody>
        </table>
      </div>
    </div>

    <script>
      const esc = (s) =>
        (s == null ? "" : String(s)).replace(/[&<>]/g, (c) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;" }[c]));
      const fmtTime = (t) => {
        if (!t) return "";
        const d = new Date(t);
        return isNaN(d) ? esc(t) : d.toLocaleString();
      };

      async function load() {
        try {
          const [statsRes, emailsRes] = await Promise.all([
            fetch("/api/dashboard/stats").then((r) => r.json()),
            fetch("/api/dashboard/emails?limit=50").then((r) => r.json()),
          ]);
          renderStats(statsRes);
          renderRows(emailsRes.emails || []);
          document.getElementById("updated").textContent =
            "Updated " + new Date().toLocaleTimeString();
        } catch (e) {
          document.getElementById("rows").innerHTML =
            '<tr><td colspan="7" class="empty">Failed to load: ' + esc(e.message) + "</td></tr>";
        }
      }

      function renderStats(s) {
        const by = s.byStatus || {};
        const cards = [
          ["Total", s.total || 0],
          ["Replied", by.replied || 0],
          ["Skipped", by.skipped || 0],
          ["Escalated", by.escalated || 0],
        ];
        document.getElementById("stats").innerHTML = cards
          .map(([l, n]) => '<div class="card"><div class="n">' + n + '</div><div class="l">' + l + "</div></div>")
          .join("");
      }

      function renderRows(rows) {
        if (!rows.length) {
          document.getElementById("rows").innerHTML =
            '<tr><td colspan="7" class="empty">No emails processed yet.</td></tr>';
          return;
        }
        document.getElementById("rows").innerHTML = rows
          .map((r) => {
            const status =
              '<span class="badge ' + esc(r.status) + '">' + esc(r.status) + "</span>" +
              (r.reason ? '<div class="muted">' + esc(r.reason) + "</div>" : "");
            const subj =
              '<div class="subj">' + esc(r.subject || "(no subject)") + "</div>" +
              (r.reply_preview ? '<div class="preview">' + esc(r.reply_preview) + "</div>" : "");
            const mode = r.delivery_mode
              ? '<span class="badge ' + esc(r.delivery_mode) + '">' + esc(r.delivery_mode) + "</span>" +
                (r.used_context ? ' <span class="muted">+ctx</span>' : "")
              : "";
            const ai = r.ai_ms ? (r.ai_ms / 1000).toFixed(1) + "s" : "";
            const paused = r.paused == 1;
            const control =
              '<button class="tbtn ' + (paused ? "paused" : "") +
              "\" onclick=\"toggleThread('" + esc(r.thread_id) + "'," + (paused ? 1 : 0) +
              ')">' + (paused ? "Paused · Resume" : "Pause AI") + "</button>";
            return (
              "<tr><td>" + status + "</td><td>" + esc(r.sender) + "</td><td>" + subj +
              "</td><td>" + mode + "</td><td>" + ai +
              '</td><td class="muted">' + esc(fmtTime(r.processed_at)) +
              "</td><td>" + control + "</td></tr>"
            );
          })
          .join("");
      }

      // --- AI on/off toggle ---
      let aiEnabled = null;
      async function loadSettings() {
        try {
          const s = await fetch("/api/dashboard/settings").then((r) => r.json());
          setToggle(s.aiEnabled);
        } catch (e) {}
      }
      function setToggle(on) {
        aiEnabled = on;
        const b = document.getElementById("toggle");
        b.textContent = "AI Auto-Reply: " + (on ? "ON" : "OFF");
        b.className = "toggle " + (on ? "on" : "off");
      }
      async function toggleAi() {
        const next = !aiEnabled;
        const b = document.getElementById("toggle");
        b.disabled = true;
        try {
          const s = await fetch("/api/dashboard/settings", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ aiEnabled: next }),
          }).then((r) => r.json());
          setToggle(s.aiEnabled);
        } catch (e) {
          alert("Failed to update: " + e.message);
        }
        b.disabled = false;
      }

      // --- per-conversation AI pause ---
      async function toggleThread(threadId, currentlyPaused) {
        try {
          await fetch("/api/dashboard/threads/" + encodeURIComponent(threadId), {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ paused: !currentlyPaused }),
          });
          load(); // refresh to reflect the new state
        } catch (e) {
          alert("Failed to update conversation: " + e.message);
        }
      }

      load();
      loadSettings();
      setInterval(load, 15000);
    </script>
  </body>
</html>
